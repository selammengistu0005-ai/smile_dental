<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright White Theme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    <div id="theme-toggle" class="toggle-container">
        <img src="https://raw.githubusercontent.com/selammengistu0005-ai/smile_dental/main/dark_tooth-removebg-preview.png" 
             id="theme-icon-light" 
             alt="Switch to Dark Mode">
        
        <img src="https://raw.githubusercontent.com/selammengistu0005-ai/smile_dental/main/light_tooth-removebg-preview.png" 
             id="theme-icon-dark" 
             alt="Switch to Light Mode" 
             style="display: none;">
    </div>
</header>

<main>
    <section class="hero">
        <div class="image-container">
            <img src="https://raw.githubusercontent.com/selammengistu0005-ai/smile_dental/main/lower_jaw_tooth-removebg-preview%20(1).png" 
                 alt="Lower Jaw Dental View" 
                 class="jaw-image">
        </div>
        <h1>Smile Dental Care</h1>
        <p>Your journey to a healthier, brighter smile starts here.</p>
        <button class="cta-button">Book an Appointment</button>
    </section>

    <div class="tracker-container"> 
        <h3>How many times per week do you brush?</h3>
        <div class="days-wrapper">
            <div class="day-box" data-day="Mon">Mon</div>
            <div class="day-box" data-day="Tue">Tue</div>
            <div class="day-box" data-day="Wed">Wed</div>
            <div class="day-box" data-day="Thu">Thu</div>
            <div class="day-box" data-day="Fri">Fri</div>
            <div class="day-box" data-day="Sat">Sat</div>
            <div class="day-box" data-day="Sun">Sun</div>
        </div>
        <div id="brushing-advice" class="info-box">
            Select the days you've brushed to get personalized advice!
        </div>
    </div>
</main>

    <script src="script.js"></script>
</body>
</html>
